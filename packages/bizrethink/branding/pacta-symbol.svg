<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Pacta favicon / app-icon symbol — charcoal rounded tile with a
       confident lowercase "p" wordmark and the signature gold dot.
       Tile fills canvas for maximum legibility at favicon sizes
       (16/32/48px). Used by build-assets.mjs to render favicon.ico,
       favicon-16x16.png, favicon-32x32.png, apple-touch-icon, and
       android-chrome variants. -->
  <rect width="256" height="256" rx="56" fill="#1f2937"/>
  <text
    x="44"
    y="200"
    font-family="Inter, -apple-system, BlinkMacSystemFont, system-ui, sans-serif"
    font-weight="900"
    font-size="232"
    fill="#fafafa"
    letter-spacing="-12">p</text>
  <circle cx="208" cy="174" r="18" fill="#d4a574"/>
</svg>
